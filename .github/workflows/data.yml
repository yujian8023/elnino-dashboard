name: Update Stock Data

on:
  schedule:
    - cron: '0 1,9 * * *'  # 每天 9:00 和 17:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Get stock data
        run: |
          python3 << 'PYEOF'
import requests
import json
import os
from datetime import datetime

# 东方财富板块数据
url = "https://push2.eastmoney.com/api/qt/clist/get"
params = {
    "pn": 1,
    "pz": 100,
    "po": 1,
    "np": 1,
    "ut": "bd341d4909e514d00",
    "fid": "f8",
    "fs": "m:90+t:2"
}
headers = {
    "User-Agent": "Mozilla/5.0"
}

try:
    resp = requests.get(url, params=params, headers=headers, timeout=15)
    data = resp.json()
    # 提取厄尔尼诺相关板块
    keywords = ['农林牧渔', '电力', '家电', '有色金属', '水利', '钢铁', '化工', '煤炭']
    result = []
    for s in data.get('data', {}).get('diff', []):
        name = s.get('f14', '')
        for kw in keywords:
            if kw in name:
                result.append({
                    'name': name,
                    'change': s.get('f3', 0),
                    'volume': s.get('f5', 0)
                })
                break
    # 保存
    with open('stock_data.json', 'w') as f:
        json.dump({'update_time': datetime.now().isoformat(), 'sectors': result}, f, ensure_ascii=False)
    print(f"Updated {len(result)} sectors")
except Exception as e:
    print(f"Error: {e}")
    # 创建空文件
    with open('stock_data.json', 'w') as f:
        json.dump({'update_time': '', 'sectors': []}, f)
PYEOF

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update stock data"
          file_pattern: "stock_data.json"
